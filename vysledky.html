<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberGuard - Vase vysledky</title>
  <meta name="description" content="Vysledky vaseho testu znalosti kyberneticke bezpecnosti s doporucenim pro dalsi vzdelavani.">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <div class="app-layout" id="app">
    <script src="/js/main.js"></script>
    <script>document.getElementById('app').insertAdjacentHTML('afterbegin', sidebarHTML());</script>

    <main class="main-content">
      <div class="container-md page-padding" id="results-container">
        <div class="text-center py-16" id="loading-state">
          <div class="skeleton" style="height:32px;width:200px;margin:0 auto 16px;"></div>
          <div class="skeleton" style="height:120px;margin-bottom:16px;"></div>
          <div class="grid grid-2" style="gap:16px;">
            <div class="skeleton" style="height:256px;"></div>
            <div class="skeleton" style="height:256px;"></div>
          </div>
        </div>
        <div id="results-content" style="display:none;"></div>
        <div id="error-state" style="display:none;" class="flex justify-center items-center" style="min-height:60vh;">
          <div class="card" style="max-width:400px;margin:80px auto;">
            <div class="card-content p-8 text-center">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" style="margin:0 auto 16px;opacity:0.5;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
              <h2 class="text-lg font-bold mb-2">Vysledek nebyl nalezen</h2>
              <p class="text-sm text-muted mb-6">Tento vysledek neexistuje nebo byl odstranen.</p>
              <a href="/test.html" class="btn btn-primary" data-testid="button-go-quiz">Vyplnit test</a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/quiz-data.js"></script>
  <script src="/js/vysledky.js"></script>
</body>
</html>
